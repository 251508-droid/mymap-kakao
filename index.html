<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페 & 문화예술 공간 검색 🗺️</title>
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f13;
      --panel: #17171e;
      --card: #1e1e28;
      --card-hover: #252530;
      --border: #2e2e3e;
      --accent: #ffde00;
      --accent2: #ff6b35;
      --text-primary: #f0f0f5;
      --text-secondary: #9090a8;
      --text-muted: #5a5a70;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .logo {
      font-family: 'Gmarket Sans', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text-secondary); font-weight: 300; }
    .header-badge {
      font-size: 11px;
      background: rgba(255,222,0,0.12);
      color: var(--accent);
      border: 1px solid rgba(255,222,0,0.25);
      padding: 3px 10px;
      border-radius: 99px;
      margin-left: auto;
    }

    /* ── 메인 레이아웃 ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 왼쪽 패널 ── */
    .sidebar {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .search-area {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,222,0,0.1);
    }

    .search-btn {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-family: 'Gmarket Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover { background: #ffe94d; }
    .search-btn:active { transform: scale(0.96); }

    /* 빠른 검색 태그 */
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .tag {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255,222,0,0.06);
    }

    /* ── 레이어 토글 패널 ── */
    .layer-panel {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .layer-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toggle-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .toggle-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* 토글 스위치 */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle-switch input:checked + .toggle-track {
      background: rgba(255,222,0,0.25);
      border: 1px solid rgba(255,222,0,0.4);
    }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: var(--accent);
    }

    /* 반경 슬라이더 */
    .radius-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }
    .radius-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .radius-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(255,222,0,0.15);
    }
    .radius-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      min-width: 52px;
      text-align: right;
    }

    /* 결과 영역 */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
    }
    .result-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .result-count {
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
    }

    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-list::-webkit-scrollbar { width: 4px; }
    .result-list::-webkit-scrollbar-track { background: transparent; }
    .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* 플레이스 카드 */
    .place-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .place-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 99px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .place-card:hover {
      background: var(--card-hover);
      border-color: rgba(255,222,0,0.3);
      transform: translateX(3px);
    }
    .place-card:hover::before { opacity: 1; }
    .place-card.active {
      border-color: var(--accent);
      background: rgba(255,222,0,0.06);
    }
    .place-card.active::before { opacity: 1; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-emoji { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .place-name { font-weight: 700; font-size: 14px; color: var(--text-primary); line-height: 1.3; }
    .place-category {
      font-size: 10px;
      background: rgba(255,107,53,0.15);
      color: var(--accent2);
      border: 1px solid rgba(255,107,53,0.25);
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .place-addr { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; padding-left: 26px; }
    .place-dist { font-size: 11px; color: var(--text-muted); padding-left: 26px; }

    /* 빈 상태 */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 40px;
      text-align: center;
    }
    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-text { font-size: 14px; line-height: 1.6; }

    /* ── 오른쪽: 지도 ── */
    .map-wrap { flex: 1; position: relative; background: var(--bg); }
    #map { width: 100%; height: 100%; }

    /* 지도 위 버튼 */
    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .map-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }
    .map-btn:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); }

    /* 로딩 오버레이 */
    .loading-overlay {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 200; transition: opacity 0.5s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-secondary); }

    /* 이모지 마커 */
    .emoji-marker {
      font-size: 28px; cursor: pointer;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      transition: transform 0.15s;
      user-select: none; line-height: 1;
    }
    .emoji-marker:hover { transform: scale(1.25); }
    .emoji-marker.active { transform: scale(1.35); }

    /* 커스텀 팝업 */
    .info-popup {
      background: var(--panel);
      border: 1.5px solid var(--accent);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-primary);
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      min-width: 180px; max-width: 260px;
      pointer-events: none;
      position: relative;
    }
    .info-popup-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .info-popup-addr { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
    .info-popup::after {
      content: '';
      position: absolute;
      bottom: -9px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--accent);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MAP<span>SEARCH</span></div>
  <div class="header-badge">카카오맵 연동</div>
</header>

<div class="main">
  <div class="sidebar">

    <!-- 검색 영역 -->
    <div class="search-area">
      <div class="search-label">장소 검색</div>
      <div class="search-box">
        <input class="search-input" id="searchInput" type="text" placeholder="예) 카페, 미술관, 북카페…" autocomplete="off" />
        <button class="search-btn" id="searchBtn">검색</button>
      </div>
      <div class="quick-tags">
        <span class="tag" data-keyword="카페">☕ 카페</span>
        <span class="tag" data-keyword="미술관">🖼️ 미술관</span>
        <span class="tag" data-keyword="박물관">🏛️ 박물관</span>
        <span class="tag" data-keyword="갤러리">🎨 갤러리</span>
        <span class="tag" data-keyword="북카페">📚 북카페</span>
        <span class="tag" data-keyword="공연장">🎭 공연장</span>
      </div>
    </div>

    <!-- 레이어 ON/OFF 패널 -->
    <div class="layer-panel">
      <div class="search-label">레이어 설정</div>

      <!-- 반경 원 토글 -->
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-title">🔵 내 위치 반경 원</div>
          <div class="toggle-desc">현재 위치 기준 반경 표시</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="circleToggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
      <!-- 반경 슬라이더 (원 ON일 때만 활성화) -->
      <div class="radius-row" id="radiusRow" style="opacity:0.3; pointer-events:none;">
        <input type="range" class="radius-slider" id="radiusSlider" min="100" max="2000" step="100" value="500" />
        <span class="radius-value" id="radiusValue">500m</span>
      </div>

      <!-- 홍대 다각형 토글 -->
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-title">🟣 홍대 거리 구역</div>
          <div class="toggle-desc">홍대 문화예술 거리 범위</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="polygonToggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <!-- 결과 리스트 -->
    <div class="result-header">
      <div class="result-title">검색 결과</div>
      <div class="result-count" id="resultCount"></div>
    </div>
    <div class="result-list" id="resultList">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">키워드나 태그를 눌러<br>주변 장소를 찾아보세요</div>
      </div>
    </div>
  </div>

  <!-- 지도 -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">지도를 불러오는 중...</div>
    </div>
    <div class="map-controls">
      <button class="map-btn" id="myLocationBtn">📍 내 위치</button>
    </div>
  </div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cd6ac276d056a317bc521b35eee29075&libraries=services"></script>
<script>
// ── 전역 변수 ────────────────────────────────────────────
let map = null;
let myMarker = null;
let myLat = 37.5665;   // 현재 위치 위도 (기본값: 서울시청)
let myLng = 126.9780;  // 현재 위치 경도

let customOverlays = [];  // 이모지 마커
let infoOverlays = [];    // 팝업
let activeOverlayIndex = -1;

// ── 레이어 객체 ──────────────────────────────────────────
let radiusCircle = null;   // 반경 원
let hongdaePolygon = null; // 홍대 다각형

// ── 현재 반경값 (미터) ───────────────────────────────────
let currentRadius = 500;

// ── 홍대 거리 다각형 좌표 ────────────────────────────────
// 홍대입구역 ~ 홍대 걷고싶은거리 ~ 상상마당 ~ 홍대 클럽거리 일대
const HONGDAE_PATH = [
  new kakao.maps.LatLng(37.5580, 126.9218),
  new kakao.maps.LatLng(37.5555, 126.9210),
  new kakao.maps.LatLng(37.5540, 126.9230),
  new kakao.maps.LatLng(37.5535, 126.9255),
  new kakao.maps.LatLng(37.5545, 126.9275),
  new kakao.maps.LatLng(37.5560, 126.9280),
  new kakao.maps.LatLng(37.5575, 126.9268),
  new kakao.maps.LatLng(37.5590, 126.9250),
  new kakao.maps.LatLng(37.5590, 126.9230),
];

// ── 카테고리 → 이모지 매핑 ──────────────────────────────
const CATEGORY_EMOJI_MAP = [
  { keywords: ['카페', '커피', '베이커리', '디저트', '브런치'], emoji: '☕' },
  { keywords: ['미술관', '갤러리', '전시'],                      emoji: '🖼️' },
  { keywords: ['박물관'],                                        emoji: '🏛️' },
  { keywords: ['공연', '극장', '영화', '콘서트'],                emoji: '🎭' },
  { keywords: ['도서관', '북카페', '서점'],                      emoji: '📚' },
  { keywords: ['문화', '예술', '센터'],                          emoji: '🎨' },
  { keywords: ['음식', '식당', '레스토랑', '맛집'],             emoji: '🍽️' },
];

function getEmoji(placeName, categoryName) {
  const combined = (placeName + ' ' + categoryName).toLowerCase();
  for (const rule of CATEGORY_EMOJI_MAP) {
    if (rule.keywords.some(kw => combined.includes(kw))) return rule.emoji;
  }
  return '📍';
}

// ── 지도 초기화 ──────────────────────────────────────────
function initMap(lat, lng) {
  myLat = lat;
  myLng = lng;

  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(lat, lng),
    level: 5
  });

  placeMyMarker(lat, lng);
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// ── 현재 위치 마커 ───────────────────────────────────────
function placeMyMarker(lat, lng) {
  if (myMarker) myMarker.setMap(null);
  const position = new kakao.maps.LatLng(lat, lng);
  const markerImage = new kakao.maps.MarkerImage(
    'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
    new kakao.maps.Size(24, 35)
  );
  myMarker = new kakao.maps.Marker({ position, map, title: '내 위치', image: markerImage });
}

// ════════════════════════════════════════════════════════
// ── 반경 원 그리기 / 제거 ────────────────────────────────
// ════════════════════════════════════════════════════════
function drawCircle(radius) {
  // 기존 원이 있으면 먼저 지우기
  if (radiusCircle) radiusCircle.setMap(null);

  radiusCircle = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(myLat, myLng),
    radius: radius,
    strokeWeight: 2,
    strokeColor: '#ffde00',
    strokeOpacity: 0.9,
    strokeStyle: 'solid',
    fillColor: '#ffde00',
    fillOpacity: 0.07
  });
  radiusCircle.setMap(map);
}

function removeCircle() {
  if (radiusCircle) {
    radiusCircle.setMap(null);
    radiusCircle = null;
  }
}

// ════════════════════════════════════════════════════════
// ── 홍대 다각형 그리기 / 제거 ────────────────────────────
// ════════════════════════════════════════════════════════
function drawHongdaePolygon() {
  if (hongdaePolygon) hongdaePolygon.setMap(null);

  hongdaePolygon = new kakao.maps.Polygon({
    path: HONGDAE_PATH,
    strokeWeight: 2,
    strokeColor: '#c084fc',   // 보라색 선
    strokeOpacity: 0.9,
    strokeStyle: 'solid',
    fillColor: '#c084fc',
    fillOpacity: 0.12
  });
  hongdaePolygon.setMap(map);
}

function removeHongdaePolygon() {
  if (hongdaePolygon) {
    hongdaePolygon.setMap(null);
    hongdaePolygon = null;
  }
}

// ── 기존 검색 마커 전체 제거 ─────────────────────────────
function clearOverlays() {
  customOverlays.forEach(ov => ov.setMap(null));
  infoOverlays.forEach(ov => ov.setMap(null));
  customOverlays = [];
  infoOverlays = [];
  activeOverlayIndex = -1;
}

// ── 장소 검색 ────────────────────────────────────────────
function searchPlaces() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) { alert('검색어를 입력해주세요!'); return; }

  const ps = new kakao.maps.services.Places();
  ps.keywordSearch(keyword, function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      displayResults(data);
    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
      clearOverlays();
      showEmpty('😅', '검색 결과가 없어요.<br>다른 키워드로 시도해보세요.');
      document.getElementById('resultCount').textContent = '';
    } else {
      showEmpty('⚠️', '검색 중 오류가 발생했어요.<br>잠시 후 다시 시도해보세요.');
    }
  });
}

// ── 결과 표시 ────────────────────────────────────────────
function displayResults(places) {
  clearOverlays();

  const listEl = document.getElementById('resultList');
  const countEl = document.getElementById('resultCount');
  listEl.innerHTML = '';
  countEl.textContent = `${places.length}개`;

  const bounds = new kakao.maps.LatLngBounds();

  places.forEach((place, i) => {
    const position = new kakao.maps.LatLng(place.y, place.x);
    const emoji = getEmoji(place.place_name, place.category_name || '');
    const categoryLabel = place.category_name ? place.category_name.split(' > ').pop() : '';
    const addrText = place.road_address_name || place.address_name;

    bounds.extend(position);

    // 이모지 마커
    const markerDiv = document.createElement('div');
    markerDiv.className = 'emoji-marker';
    markerDiv.textContent = emoji;

    const markerOverlay = new kakao.maps.CustomOverlay({
      position, content: markerDiv, yAnchor: 1.1, zIndex: 3
    });
    markerOverlay.setMap(map);
    customOverlays.push(markerOverlay);

    // 팝업
    const popupDiv = document.createElement('div');
    popupDiv.className = 'info-popup';
    popupDiv.innerHTML = `
      <div class="info-popup-name">${emoji} ${place.place_name}</div>
      <div class="info-popup-addr">${addrText}</div>
    `;
    const infoOverlay = new kakao.maps.CustomOverlay({
      position, content: popupDiv, yAnchor: 2.5, zIndex: 5
    });
    infoOverlay.setMap(null);
    infoOverlays.push(infoOverlay);

    markerDiv.addEventListener('click', () => {
      togglePopup(i);
      setActiveCard(i);
    });

    // 카드
    const distText = place.distance ? `📏 ${Number(place.distance).toLocaleString()}m` : '';
    const card = document.createElement('div');
    card.className = 'place-card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name-row">
          <span class="card-emoji">${emoji}</span>
          <span class="place-name">${place.place_name}</span>
        </div>
        ${categoryLabel ? `<div class="place-category">${categoryLabel}</div>` : ''}
      </div>
      <div class="place-addr">${addrText}</div>
      ${distText ? `<div class="place-dist">${distText}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      map.setCenter(position);
      map.setLevel(3);
      togglePopup(i);
      setActiveCard(i);
    });
    listEl.appendChild(card);
  });

  map.setBounds(bounds);
}

// ── 팝업 토글 ────────────────────────────────────────────
function togglePopup(index) {
  if (activeOverlayIndex === index) {
    infoOverlays[index].setMap(null);
    customOverlays[index].getContent().classList.remove('active');
    activeOverlayIndex = -1;
  } else {
    if (activeOverlayIndex !== -1) {
      infoOverlays[activeOverlayIndex].setMap(null);
      customOverlays[activeOverlayIndex].getContent().classList.remove('active');
    }
    infoOverlays[index].setMap(map);
    customOverlays[index].getContent().classList.add('active');
    activeOverlayIndex = index;
  }
}

function setActiveCard(index) {
  document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.place-card[data-index="${index}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function showEmpty(icon, text) {
  document.getElementById('resultList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">${icon}</div>
      <div class="empty-text">${text}</div>
    </div>
  `;
}

// ════════════════════════════════════════════════════════
// ── 레이어 토글 이벤트 ───────────────────────────────────
// ════════════════════════════════════════════════════════

// 반경 원 ON/OFF
document.getElementById('circleToggle').addEventListener('change', function() {
  const radiusRow = document.getElementById('radiusRow');
  if (this.checked) {
    // 슬라이더 활성화
    radiusRow.style.opacity = '1';
    radiusRow.style.pointerEvents = 'auto';
    drawCircle(currentRadius);
  } else {
    // 슬라이더 비활성화
    radiusRow.style.opacity = '0.3';
    radiusRow.style.pointerEvents = 'none';
    removeCircle();
  }
});

// 반경 슬라이더 조절 → 원 실시간 업데이트
document.getElementById('radiusSlider').addEventListener('input', function() {
  currentRadius = Number(this.value);
  document.getElementById('radiusValue').textContent = `${currentRadius}m`;
  // 원이 켜져 있을 때만 다시 그리기
  if (document.getElementById('circleToggle').checked) {
    drawCircle(currentRadius);
  }
});

// 홍대 다각형 ON/OFF
document.getElementById('polygonToggle').addEventListener('change', function() {
  if (this.checked) {
    drawHongdaePolygon();
    // 홍대 중심으로 지도 이동
    map.setCenter(new kakao.maps.LatLng(37.5563, 126.9245));
    map.setLevel(5);
  } else {
    removeHongdaePolygon();
  }
});

// ── 내 위치 버튼 ─────────────────────────────────────────
document.getElementById('myLocationBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('위치 정보를 지원하지 않는 브라우저예요.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      myLat = pos.coords.latitude;
      myLng = pos.coords.longitude;
      map.setCenter(new kakao.maps.LatLng(myLat, myLng));
      map.setLevel(5);
      placeMyMarker(myLat, myLng);
      // 원이 켜져 있으면 내 위치 기준으로 다시 그리기
      if (document.getElementById('circleToggle').checked) {
        drawCircle(currentRadius);
      }
    },
    () => alert('위치 정보를 가져올 수 없어요.')
  );
});

// ── 검색 이벤트 ──────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', searchPlaces);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchPlaces();
});
document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.getElementById('searchInput').value = tag.dataset.keyword;
    searchPlaces();
  });
});

// ── SDK 로드 후 지도 초기화 ──────────────────────────────
kakao.maps.load(function() {
  // HONGDAE_PATH는 kakao.maps.LatLng가 필요해서 load() 안에서 초기화해야 해
  HONGDAE_PATH.length = 0;
  [
    [37.5580, 126.9218], [37.5555, 126.9210], [37.5540, 126.9230],
    [37.5535, 126.9255], [37.5545, 126.9275], [37.5560, 126.9280],
    [37.5575, 126.9268], [37.5590, 126.9250], [37.5590, 126.9230],
  ].forEach(([lat, lng]) => HONGDAE_PATH.push(new kakao.maps.LatLng(lat, lng)));

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => initMap(pos.coords.latitude, pos.coords.longitude),
      ()  => initMap(37.5665, 126.9780),
      { timeout: 6000 }
    );
  } else {
    initMap(37.5665, 126.9780);
  }
});
</script>
</body>
