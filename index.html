<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페 & 문화예술 공간 검색 🗺️</title>
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f13;
      --panel: #17171e;
      --card: #1e1e28;
      --card-hover: #252530;
      --border: #2e2e3e;
      --accent: #ffde00;
      --accent2: #ff6b35;
      --text-primary: #f0f0f5;
      --text-secondary: #9090a8;
      --text-muted: #5a5a70;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .logo { font-family: 'Gmarket Sans', sans-serif; font-weight: 700; font-size: 20px; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text-secondary); font-weight: 300; }
    .header-badge {
      font-size: 11px;
      background: rgba(255,222,0,0.12);
      color: var(--accent);
      border: 1px solid rgba(255,222,0,0.25);
      padding: 3px 10px;
      border-radius: 99px;
      margin-left: auto;
    }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── 왼쪽 패널 ── */
    .sidebar {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── 탭 버튼 ── */
    .tab-bar {
      display: flex;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 0;
      background: none;
      border: none;
      font-family: 'Gmarket Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 99px;
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn.active.culture { color: #c084fc; }
    .tab-btn.active.culture::after { background: #c084fc; }

    /* ── 키워드 검색창 ── */
    .search-area {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-box { display: flex; gap: 8px; align-items: center; }
    .search-input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,222,0,0.1); }
    .search-btn {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-family: 'Gmarket Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover { background: #ffe94d; }
    .search-btn:active { transform: scale(0.96); }

    /* ── 결과 헤더 ── */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 8px;
      flex-shrink: 0;
    }
    .result-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; }
    .result-count { font-size: 12px; color: var(--accent); font-weight: 700; }

    /* ── 결과 리스트 ── */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-list::-webkit-scrollbar { width: 4px; }
    .result-list::-webkit-scrollbar-track { background: transparent; }
    .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* 키워드 검색 시에만 쓰는 페이지네이션 */
    .pagination {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
    }
    .page-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(255,222,0,0.06); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 12px; color: var(--text-muted); }

    /* ── 플레이스 카드 ── */
    .place-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .place-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 99px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .place-card:hover { background: var(--card-hover); border-color: rgba(255,222,0,0.3); transform: translateX(3px); }
    .place-card:hover::before { opacity: 1; }
    .place-card.active { border-color: var(--accent); background: rgba(255,222,0,0.06); }
    .place-card.active::before { opacity: 1; }
    .place-card.culture-card:hover { border-color: rgba(192,132,252,0.3); }
    .place-card.culture-card::before { background: #c084fc; }
    .place-card.culture-card.active { border-color: #c084fc; background: rgba(192,132,252,0.06); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .card-name-row { display: flex; align-items: center; gap: 8px; }
    .card-emoji { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .place-name { font-weight: 700; font-size: 14px; color: var(--text-primary); line-height: 1.3; }
    .place-category {
      font-size: 10px;
      background: rgba(255,107,53,0.15);
      color: var(--accent2);
      border: 1px solid rgba(255,107,53,0.25);
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .place-addr { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; padding-left: 26px; }
    .place-dist { font-size: 11px; color: var(--text-muted); padding-left: 26px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 40px;
      text-align: center;
    }
    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-text { font-size: 14px; line-height: 1.6; }

    /* ── 오른쪽 지도 ── */
    .map-wrap { flex: 1; position: relative; background: var(--bg); }
    #map { width: 100%; height: 100%; }

    /* ── 플로팅 컨트롤 ── */
    .map-controls {
      position: absolute;
      top: 16px; right: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .map-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }
    .map-btn:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); }
    .map-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(255,222,0,0.08); }
    .map-btn.on.purple { border-color: #c084fc; color: #c084fc; background: rgba(192,132,252,0.08); }

    .radius-popup {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .radius-popup.visible { display: flex; }
    .radius-popup-label { font-size: 11px; color: var(--text-muted); }
    .radius-row { display: flex; align-items: center; gap: 8px; }
    .radius-slider {
      flex: 1; -webkit-appearance: none;
      height: 4px; border-radius: 99px;
      background: var(--border); outline: none; cursor: pointer; min-width: 100px;
    }
    .radius-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      box-shadow: 0 0 0 3px rgba(255,222,0,0.15);
    }
    .radius-value { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 46px; text-align: right; }

    /* 로딩 */
    .loading-overlay {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 200; transition: opacity 0.5s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-secondary); }

    /* 이모지 마커 */
    .emoji-marker {
      font-size: 28px; cursor: pointer;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      transition: transform 0.15s;
      user-select: none; line-height: 1;
    }
    .emoji-marker:hover { transform: scale(1.25); }
    .emoji-marker.active { transform: scale(1.35); }

    /* 팝업 */
    .info-popup {
      background: var(--panel);
      border: 1.5px solid var(--accent);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-primary);
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      min-width: 180px; max-width: 260px;
      pointer-events: none; position: relative;
    }
    .info-popup.culture-popup { border-color: #c084fc; }
    .info-popup.culture-popup::after { border-top-color: #c084fc !important; }
    .info-popup-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .info-popup-addr { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
    .info-popup::after {
      content: '';
      position: absolute;
      bottom: -9px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--accent);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MAP<span>SEARCH</span></div>
  <div class="header-badge">카카오맵 연동</div>
</header>

<div class="main">
  <div class="sidebar">

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabCafe">☕ 카페</button>
      <button class="tab-btn culture" id="tabCulture">🎨 문화예술</button>
    </div>

    <!-- 키워드 검색창 -->
    <div class="search-area">
      <div class="search-box">
        <input class="search-input" id="searchInput" type="text" placeholder="키워드 직접 검색…" autocomplete="off" />
        <button class="search-btn" id="searchBtn">검색</button>
      </div>
    </div>

    <!-- 결과 헤더 -->
    <div class="result-header">
      <div class="result-title" id="resultTitle">카페</div>
      <div class="result-count" id="resultCount"></div>
    </div>

    <!-- 결과 리스트 -->
    <div class="result-list" id="resultList">
      <div class="empty-state">
        <div class="empty-icon">☕</div>
        <div class="empty-text">탭을 눌러<br>내 주변 장소를 찾아보세요</div>
      </div>
    </div>

    <!-- 키워드 검색 전용 페이지네이션 -->
    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn" id="prevBtn">← 이전</button>
      <span class="page-info" id="pageInfo"></span>
      <button class="page-btn" id="nextBtn">다음 →</button>
    </div>
  </div>

  <!-- 지도 -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">지도를 불러오는 중...</div>
    </div>
    <div class="map-controls">
      <button class="map-btn" id="myLocationBtn">📍 내 위치</button>
      <button class="map-btn" id="circleBtn">🔵 반경 원 OFF</button>
      <div class="radius-popup" id="radiusPopup">
        <div class="radius-popup-label">반경 조절</div>
        <div class="radius-row">
          <input type="range" class="radius-slider" id="radiusSlider" min="100" max="2000" step="100" value="500" />
          <span class="radius-value" id="radiusValue">500m</span>
        </div>
      </div>
      <button class="map-btn" id="polygonBtn">🟣 홍대 구역 OFF</button>
    </div>
  </div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cd6ac276d056a317bc521b35eee29075&libraries=services"></script>
<script>
// ── 전역 변수 ────────────────────────────────────────────
let map = null;
let myMarker = null;
let myLat = 37.5665;
let myLng = 126.9780;

let customOverlays = [];
let infoOverlays = [];
let activeOverlayIndex = -1;

let radiusCircle = null;
let hongdaePolygon = null;
let isCircleOn = false;
let isPolygonOn = false;
let currentRadius = 500;

// 탭 & 키워드 검색 상태
let currentMode = 'tab';      // 'tab' | 'keyword'
let currentTab = 'cafe';
let currentKeyword = '';
let currentPage = 1;
let isLastPage = false;

const HONGDAE_PATH = [];

// ── 탭별 설정 ────────────────────────────────────────────
const TAB_CONFIG = {
  cafe:    { label: '카페',    categoryCode: 'CE7', emptyIcon: '☕', emptyText: '내 주변 카페가 없어요.<br>반경을 넓혀볼게요!' },
  culture: { label: '문화예술', categoryCode: 'CT1', emptyIcon: '🎨', emptyText: '내 주변 문화예술 공간이 없어요.<br>반경을 넓혀볼게요!' },
};

// ── 카테고리 → 이모지 ────────────────────────────────────
const CATEGORY_EMOJI_MAP = [
  { keywords: ['카페', '커피', '베이커리', '디저트', '브런치'], emoji: '☕' },
  { keywords: ['미술관', '갤러리', '전시'],                      emoji: '🖼️' },
  { keywords: ['박물관'],                                        emoji: '🏛️' },
  { keywords: ['공연', '극장', '영화', '콘서트'],                emoji: '🎭' },
  { keywords: ['도서관', '북카페', '서점'],                      emoji: '📚' },
  { keywords: ['문화', '예술', '센터'],                          emoji: '🎨' },
  { keywords: ['음식', '식당', '레스토랑', '맛집'],             emoji: '🍽️' },
];

function getEmoji(placeName, categoryName) {
  const combined = (placeName + ' ' + categoryName).toLowerCase();
  for (const rule of CATEGORY_EMOJI_MAP) {
    if (rule.keywords.some(kw => combined.includes(kw))) return rule.emoji;
  }
  return '📍';
}

// ── 지도 초기화 ──────────────────────────────────────────
function initMap(lat, lng) {
  myLat = lat; myLng = lng;
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(lat, lng),
    level: 5
  });
  placeMyMarker(lat, lng);
  document.getElementById('loadingOverlay').classList.add('hidden');

  // 지도 로드 완료 후 카페 탭 자동 검색
  runTabSearch('cafe');
}

function placeMyMarker(lat, lng) {
  if (myMarker) myMarker.setMap(null);
  myMarker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(lat, lng),
    map,
    title: '내 위치',
    image: new kakao.maps.MarkerImage(
      'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
      new kakao.maps.Size(24, 35)
    )
  });
}

// ── 반경 원 ──────────────────────────────────────────────
function drawCircle(radius) {
  if (radiusCircle) radiusCircle.setMap(null);
  radiusCircle = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(myLat, myLng),
    radius,
    strokeWeight: 2, strokeColor: '#ffde00', strokeOpacity: 0.9, strokeStyle: 'solid',
    fillColor: '#ffde00', fillOpacity: 0.07
  });
  radiusCircle.setMap(map);
}
function removeCircle() {
  if (radiusCircle) { radiusCircle.setMap(null); radiusCircle = null; }
}

// ── 홍대 다각형 ──────────────────────────────────────────
function drawHongdaePolygon() {
  if (hongdaePolygon) hongdaePolygon.setMap(null);
  hongdaePolygon = new kakao.maps.Polygon({
    path: HONGDAE_PATH,
    strokeWeight: 2, strokeColor: '#c084fc', strokeOpacity: 0.9, strokeStyle: 'solid',
    fillColor: '#c084fc', fillOpacity: 0.12
  });
  hongdaePolygon.setMap(map);
}
function removeHongdaePolygon() {
  if (hongdaePolygon) { hongdaePolygon.setMap(null); hongdaePolygon = null; }
}

function clearOverlays() {
  customOverlays.forEach(ov => ov.setMap(null));
  infoOverlays.forEach(ov => ov.setMap(null));
  customOverlays = []; infoOverlays = [];
  activeOverlayIndex = -1;
}

// ════════════════════════════════════════════════════════
// ── 탭 검색: 내 현재 위치 기준 가까운 순 15개 ────────────
// ════════════════════════════════════════════════════════
function runTabSearch(tab) {
  currentMode = 'tab';
  currentTab = tab;

  // 페이지네이션 숨기기 (탭 모드엔 불필요)
  document.getElementById('pagination').style.display = 'none';

  const config = TAB_CONFIG[tab];
  document.getElementById('resultTitle').textContent = config.label;
  document.getElementById('searchInput').value = '';
  document.getElementById('resultCount').textContent = '검색 중…';

  const ps = new kakao.maps.services.Places();
  ps.categorySearch(config.categoryCode, function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      displayResults(data, null, tab);
      document.getElementById('resultCount').textContent = `가까운 ${data.length}개`;
    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
      clearOverlays();
      showEmpty(config.emptyIcon, config.emptyText);
      document.getElementById('resultCount').textContent = '';
    } else {
      showEmpty('⚠️', '검색 중 오류가 발생했어요.');
      document.getElementById('resultCount').textContent = '';
    }
  }, {
    location: new kakao.maps.LatLng(myLat, myLng), // 내 현재 위치 기준
    radius: 5000,                                   // 반경 5km 이내
    sort: kakao.maps.services.SortBy.DISTANCE,      // 가까운 순 정렬
    size: 15,                                       // 15개만
  });
}

// ════════════════════════════════════════════════════════
// ── 키워드 검색 (페이지네이션 있음) ─────────────────────
// ════════════════════════════════════════════════════════
function runKeywordSearch(keyword, page) {
  if (!keyword) { alert('검색어를 입력해주세요!'); return; }

  currentMode = 'keyword';
  currentKeyword = keyword;
  currentPage = page || 1;

  document.getElementById('resultTitle').textContent = `"${keyword}"`;
  document.getElementById('resultCount').textContent = '검색 중…';

  // 탭 활성 표시 해제
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const ps = new kakao.maps.services.Places();
  ps.keywordSearch(keyword, function(data, status, pagination) {
    if (status === kakao.maps.services.Status.OK) {
      isLastPage = pagination.last;
      displayResults(data, pagination, null);
      const startNum = (currentPage - 1) * 15 + 1;
      const endNum = startNum + data.length - 1;
      document.getElementById('resultCount').textContent =
        `${startNum}–${endNum} / 총 ${pagination.totalCount}개`;
      updatePagination(pagination);
    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
      clearOverlays();
      document.getElementById('pagination').style.display = 'none';
      showEmpty('😅', '검색 결과가 없어요.<br>다른 키워드로 시도해보세요.');
      document.getElementById('resultCount').textContent = '';
    } else {
      showEmpty('⚠️', '검색 중 오류가 발생했어요.');
    }
  }, { size: 15, page: currentPage });
}

// ── 결과 표시 ────────────────────────────────────────────
function displayResults(places, pagination, tab) {
  clearOverlays();

  const listEl = document.getElementById('resultList');
  listEl.innerHTML = '';

  const isCulture = tab === 'culture';
  const bounds = new kakao.maps.LatLngBounds();

  places.forEach((place, i) => {
    const position = new kakao.maps.LatLng(place.y, place.x);
    const emoji = getEmoji(place.place_name, place.category_name || '');
    const categoryLabel = place.category_name ? place.category_name.split(' > ').pop() : '';
    const addrText = place.road_address_name || place.address_name;

    bounds.extend(position);

    // 이모지 마커
    const markerDiv = document.createElement('div');
    markerDiv.className = 'emoji-marker';
    markerDiv.textContent = emoji;
    const markerOverlay = new kakao.maps.CustomOverlay({ position, content: markerDiv, yAnchor: 1.1, zIndex: 3 });
    markerOverlay.setMap(map);
    customOverlays.push(markerOverlay);

    // 팝업
    const popupDiv = document.createElement('div');
    popupDiv.className = `info-popup${isCulture ? ' culture-popup' : ''}`;
    popupDiv.innerHTML = `
      <div class="info-popup-name">${emoji} ${place.place_name}</div>
      <div class="info-popup-addr">${addrText}</div>
    `;
    const infoOverlay = new kakao.maps.CustomOverlay({ position, content: popupDiv, yAnchor: 2.5, zIndex: 5 });
    infoOverlay.setMap(null);
    infoOverlays.push(infoOverlay);

    markerDiv.addEventListener('click', () => { togglePopup(i); setActiveCard(i); });

    // 카드 — 탭 모드일 때 거리 표시
    const distText = place.distance ? `📏 ${Number(place.distance).toLocaleString()}m` : '';
    const card = document.createElement('div');
    card.className = `place-card${isCulture ? ' culture-card' : ''}`;
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name-row">
          <span class="card-emoji">${emoji}</span>
          <span class="place-name">${place.place_name}</span>
        </div>
        ${categoryLabel ? `<div class="place-category">${categoryLabel}</div>` : ''}
      </div>
      <div class="place-addr">${addrText}</div>
      ${distText ? `<div class="place-dist">${distText}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      map.setCenter(position);
      map.setLevel(3);
      togglePopup(i);
      setActiveCard(i);
    });
    listEl.appendChild(card);
  });

  map.setBounds(bounds);
  listEl.scrollTop = 0;
}

// ── 페이지네이션 (키워드 검색 전용) ─────────────────────
function updatePagination(pagination) {
  const el = document.getElementById('pagination');
  el.style.display = 'flex';
  document.getElementById('prevBtn').disabled = currentPage === 1;
  document.getElementById('nextBtn').disabled = pagination.last;
  document.getElementById('pageInfo').textContent = `${currentPage}페이지`;
}

// ── 팝업 토글 ────────────────────────────────────────────
function togglePopup(index) {
  if (activeOverlayIndex === index) {
    infoOverlays[index].setMap(null);
    customOverlays[index].getContent().classList.remove('active');
    activeOverlayIndex = -1;
  } else {
    if (activeOverlayIndex !== -1) {
      infoOverlays[activeOverlayIndex].setMap(null);
      customOverlays[activeOverlayIndex].getContent().classList.remove('active');
    }
    infoOverlays[index].setMap(map);
    customOverlays[index].getContent().classList.add('active');
    activeOverlayIndex = index;
  }
}

function setActiveCard(index) {
  document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.place-card[data-index="${index}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function showEmpty(icon, text) {
  document.getElementById('resultList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">${icon}</div>
      <div class="empty-text">${text}</div>
    </div>
  `;
}

// ── 이벤트 바인딩 ────────────────────────────────────────

// 탭 클릭
document.getElementById('tabCafe').addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tabCafe').classList.add('active');
  runTabSearch('cafe');
});
document.getElementById('tabCulture').addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tabCulture').classList.add('active');
  runTabSearch('culture');
});

// 키워드 검색
document.getElementById('searchBtn').addEventListener('click', () => {
  runKeywordSearch(document.getElementById('searchInput').value.trim(), 1);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runKeywordSearch(document.getElementById('searchInput').value.trim(), 1);
});

// 페이지 이전 / 다음 (키워드 모드 전용)
document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentPage > 1) runKeywordSearch(currentKeyword, currentPage - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (!isLastPage) runKeywordSearch(currentKeyword, currentPage + 1);
});

// 내 위치 버튼
document.getElementById('myLocationBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('위치 정보를 지원하지 않는 브라우저예요.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      myLat = pos.coords.latitude; myLng = pos.coords.longitude;
      map.setCenter(new kakao.maps.LatLng(myLat, myLng));
      map.setLevel(5);
      placeMyMarker(myLat, myLng);
      if (isCircleOn) drawCircle(currentRadius);
      // 탭 모드면 새 위치로 재검색
      if (currentMode === 'tab') runTabSearch(currentTab);
    },
    () => alert('위치 정보를 가져올 수 없어요.')
  );
});

// 반경 원 버튼
document.getElementById('circleBtn').addEventListener('click', () => {
  const btn = document.getElementById('circleBtn');
  isCircleOn = !isCircleOn;
  if (isCircleOn) {
    btn.textContent = '🔵 반경 원 ON';
    btn.classList.add('on');
    document.getElementById('radiusPopup').classList.add('visible');
    drawCircle(currentRadius);
  } else {
    btn.textContent = '🔵 반경 원 OFF';
    btn.classList.remove('on');
    document.getElementById('radiusPopup').classList.remove('visible');
    removeCircle();
  }
});

// 반경 슬라이더
document.getElementById('radiusSlider').addEventListener('input', function() {
  currentRadius = Number(this.value);
  document.getElementById('radiusValue').textContent = `${currentRadius}m`;
  if (isCircleOn) drawCircle(currentRadius);
});

// 홍대 구역 버튼
document.getElementById('polygonBtn').addEventListener('click', () => {
  const btn = document.getElementById('polygonBtn');
  isPolygonOn = !isPolygonOn;
  if (isPolygonOn) {
    btn.textContent = '🟣 홍대 구역 ON';
    btn.classList.add('on', 'purple');
    drawHongdaePolygon();
    map.setCenter(new kakao.maps.LatLng(37.5563, 126.9245));
    map.setLevel(5);
  } else {
    btn.textContent = '🟣 홍대 구역 OFF';
    btn.classList.remove('on', 'purple');
    removeHongdaePolygon();
  }
});

// ── SDK 로드 후 초기화 ───────────────────────────────────
kakao.maps.load(function() {
  [
    [37.5580, 126.9218], [37.5555, 126.9210], [37.5540, 126.9230],
    [37.5535, 126.9255], [37.5545, 126.9275], [37.5560, 126.9280],
    [37.5575, 126.9268], [37.5590, 126.9250], [37.5590, 126.9230],
  ].forEach(([lat, lng]) => HONGDAE_PATH.push(new kakao.maps.LatLng(lat, lng)));

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => initMap(pos.coords.latitude, pos.coords.longitude),
      ()  => initMap(37.5665, 126.9780),
      { timeout: 6000 }
    );
  } else {
    initMap(37.5665, 126.9780);
  }
});
</script>
</body>
